<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>从想法到产品：UReka 的 vibe coding 实践</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@700;800;900&family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #111111;
      --ink-alt: #1a1a18;
      --fire: #e85d26;
      --cream: #f0ece5;
      --muted: #8c8880;
      --rule: #2b2b28;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: #060606; overflow: hidden; }
    body { font-family: "Noto Sans SC", sans-serif; }

    /* === FIXED STAGE === */
    .deck-viewport {
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
    }
    .stage {
      position: relative;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: var(--ink);
      color: var(--cream);
      transform-origin: center center;
      box-shadow: 0 36px 110px rgba(0, 0, 0, .5);
    }

    /* === BROADSIDE GRID === */
    .topline, .bottomline {
      position: absolute;
      left: 70px;
      right: 70px;
      height: 1px;
      background: var(--rule);
    }
    .topline { top: 72px; }
    .bottomline { bottom: 72px; }
    .side-index {
      position: absolute;
      right: 80px;
      top: 120px;
      writing-mode: vertical-rl;
      color: var(--fire);
      font: 600 22px/1.4 "IBM Plex Mono", monospace;
      letter-spacing: .18em;
    }

    /* === TITLE SYSTEM === */
    .eyebrow {
      position: absolute;
      left: 84px;
      top: 110px;
      color: var(--fire);
      font: 600 26px/1 "IBM Plex Mono", monospace;
      letter-spacing: .14em;
      text-transform: uppercase;
    }
    .title-block {
      position: absolute;
      left: 78px;
      top: 198px;
      width: 1220px;
    }
    .title-block h1 {
      margin: 0;
      font-family: "Barlow", "Noto Sans SC", sans-serif;
      font-weight: 900;
      font-size: 176px;
      line-height: .92;
      letter-spacing: 0;
    }
    .title-block h1 strong {
      display: block;
      color: var(--fire);
      font-weight: 900;
    }
    .thesis {
      position: absolute;
      left: 90px;
      bottom: 154px;
      width: 890px;
      color: var(--cream);
      font-size: 36px;
      line-height: 1.5;
      font-weight: 500;
    }
    .thesis em {
      color: var(--fire);
      font-style: normal;
      font-weight: 900;
    }

    /* === IMAGE COLUMN === */
    .image-column {
      position: absolute;
      right: 166px;
      bottom: 120px;
      width: 430px;
      height: 760px;
      border: 1px solid var(--rule);
      background: var(--ink-alt);
      padding: 18px;
    }
    .image-column img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      filter: saturate(.92) contrast(1.08);
    }
    .fire-slab {
      position: absolute;
      right: 84px;
      bottom: 72px;
      width: 650px;
      height: 190px;
      background: var(--fire);
      mix-blend-mode: normal;
      z-index: -0;
    }
    .label {
      position: absolute;
      right: 176px;
      bottom: 96px;
      color: var(--ink);
      font: 900 54px/1 "Barlow", sans-serif;
    }

    /* === MOTION === */
    .eyebrow, .title-block, .thesis, .image-column, .label, .side-index {
      opacity: 0;
      animation: cutIn .6s cubic-bezier(.16, 1, .3, 1) forwards;
    }
    .title-block { animation-delay: .1s; }
    .image-column { animation-delay: .2s; }
    .thesis { animation-delay: .3s; }
    .label, .side-index { animation-delay: .42s; }
    @keyframes cutIn {
      from { opacity: 0; transform: translateY(26px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; opacity: 1 !important; }
    }
  </style>
</head>
<body>
  <div class="deck-viewport">
    <main class="stage" id="stage">
      <div class="topline"></div>
      <div class="bottomline"></div>
      <div class="eyebrow">UREKA / VIBE CODING / INTERNAL SHARE</div>
      <section class="title-block">
        <h1>从想法到产品<strong>不是一个 prompt</strong></h1>
      </section>
      <p class="thesis">它是一套把 <em>需求判断、Agent 架构、UI taste、代码 review</em> 串起来的个人产品开发方式。</p>
      <div class="fire-slab"></div>
      <figure class="image-column">
        <img src="../../docs/ai-sharing-export/assets/images/01-codex-workflow.png" alt="Codex thread workflow screenshot">
      </figure>
      <div class="label">30 MIN</div>
      <div class="side-index">闪念 · 硬件 · AGENT · 资产</div>
    </main>
  </div>
  <script>
    function scaleStage() {
      const stage = document.getElementById('stage');
      const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
      stage.style.transform = `scale(${scale})`;
    }
    window.addEventListener('resize', scaleStage);
    scaleStage();
  </script>
</body>
</html>
