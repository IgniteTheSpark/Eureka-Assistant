services:
  db:
    image: mysql:8.0
    # utf8mb4 server-wide so Chinese text + emoji icons store/sort correctly.
    command: >-
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: eureka
      MYSQL_USER: eureka
      MYSQL_PASSWORD: eureka
      MYSQL_ROOT_PASSWORD: eureka
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u eureka -peureka --silent"]
      interval: 5s
      timeout: 5s
      retries: 15

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql://eureka:eureka@db:3306/eureka
      # Primary LLM — DeepSeek direct API (§1.1). Empty → falls back to OpenRouter.
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # §6.6.2 AI 配图 — optional dedicated image key/model (isolates a fresh
      # image key from the DeepSeek text key). Empty → reuse OPENROUTER_API_KEY.
      IMAGE_API_KEY: ${IMAGE_API_KEY:-}
      IMAGE_MODEL: ${IMAGE_MODEL:-}
      # §14.9 web-search (briefing 会前调研) — key-driven provider: 博查(国内)优先,
      # Tavily 兜底;都空 → 搜索关闭,briefing 退化为仅用户数据。
      BOCHA_API_KEY: ${BOCHA_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      # §1.7.1 / §13.1 — Fernet key for Connected Apps + 百智 token encryption.
      CONNECTED_APPS_KEY: ${CONNECTED_APPS_KEY:-}
      DEMO_RESET_ENABLED: ${DEMO_RESET_ENABLED:-false}
      USER_ID: default

      # §13.1 / B1 百智 OAuth (all interpolated from the root .env, like the keys
      # above). Empty app_id → 百智 login is disabled (503); email login unaffected.
      BAIZHI_BASE_URL: ${BAIZHI_BASE_URL:-https://openapi.100wiser.com}
      BAIZHI_OAUTH_BASE_URL: ${BAIZHI_OAUTH_BASE_URL:-https://100wiser.com}
      BAIZHI_APP_ID: ${BAIZHI_APP_ID:-}
      BAIZHI_APP_SECRET: ${BAIZHI_APP_SECRET:-}
      BAIZHI_APP_NAME: ${BAIZHI_APP_NAME:-}
      BAIZHI_REDIRECT_URL: ${BAIZHI_REDIRECT_URL:-}
      BAIZHI_ME_URL: ${BAIZHI_ME_URL:-}
      EUREKA_APP_SCHEME: ${EUREKA_APP_SCHEME:-eureka}

      # ── Third-party MCP toggles & credentials (v1.4.x) ──
      # Toggle: which MCPs are enabled. Comma-separated names matching keys in
      # backend/agents/mcp_config.MCP_SERVERS. Empty = only fake_external.
      EUREKA_MCP_ENABLED: ${EUREKA_MCP_ENABLED:-fake_external}

      # Google Calendar (nspady/google-calendar-mcp via npx)
      GOOGLE_OAUTH_CREDENTIALS:        /mcp-credentials/google-calendar-creds.json
      GOOGLE_CALENDAR_MCP_TOKEN_PATH:  /mcp-credentials/google-calendar-token.json

      # Dingtalk AIHub — 官方托管 MCP (streamable_http transport,URL 里嵌 key).
      # 每个 instance 一个 env var,URL 从 AIHub 实例页拷贝(含 ?key=…)
      DINGTALK_AIHUB_URL_CALENDAR: ${DINGTALK_AIHUB_URL_CALENDAR:-}  # mcpId=1050 钉钉日历
      DINGTALK_AIHUB_URL_TODO:     ${DINGTALK_AIHUB_URL_TODO:-}      # mcpId=2034 钉钉待办
      DINGTALK_AIHUB_URL_NOTES:    ${DINGTALK_AIHUB_URL_NOTES:-}     # 钉钉笔记 / 文档
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      # OAuth credentials + cached tokens for third-party MCPs. Host folder
      # `./mcp-credentials/` is git-ignored; you place creds files here.
      - ./mcp-credentials:/mcp-credentials
    # --timeout-graceful-shutdown: on a --reload restart, force-close after 3s
    # instead of hanging forever on an open SSE connection (notifications
    # stream). Without it, editing a backend file could wedge the server in
    # "Waiting for connections to close" and the whole API stopped responding.
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --timeout-graceful-shutdown 3

volumes:
  mysqldata:
